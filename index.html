<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agaf-City Loading</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;800&family=Oswald:wght@700&display=swap');

        :root {
            --bg-color: #000;
            --main-color: #fff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--main-color);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- VISUAL EFFECTS --- */
        
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 8;
            opacity: 0.07;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, black 100%);
            z-index: 5;
            pointer-events: none;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ytimg.com/vi/At21TrFKpg0/maxresdefault.jpg?sqp=-oaymwEmCIAKENAF8quKqQMa8AEB-AH-CYAC0AWKAgwIABABGGMgYyhjMA8=&rs=AOn4CLAxvsmPNR5QMWrzlebKszhCR5Uc2Q');
            background-size: cover;
            background-position: center;
            filter: grayscale(100%) contrast(1.2) brightness(0.4);
            animation: zoomDrift 40s infinite alternate ease-in-out;
            z-index: 0;
        }

        @keyframes zoomDrift {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        /* --- CONTENT --- */

        .content-wrapper {
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 1000px;
            text-align: center;
            /* Moved slightly up to make room for the log at the bottom */
            position: absolute;
            top: 45%; 
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .main-title {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            font-size: 5rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            line-height: 1;
        }
        
        .subtitle {
            font-size: 1.5rem;
            color: #ccc;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            margin-bottom: 3rem;
            opacity: 0.8;
        }

        .scanner-container {
            width: 100%;
            max-width: 600px;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .scanner-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 30%;
            height: 100%;
            background: #fff;
            animation: shuttle 2s infinite ease-in-out;
        }

        @keyframes shuttle {
            0% { left: -30%; }
            50% { left: 100%; }
            100% { left: -30%; }
        }

        .status-box {
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .main-status {
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .sub-status {
            font-size: 0.9rem;
            color: #aaa;
            font-family: 'JetBrains Mono', monospace;
            min-height: 1.2em;
        }

        /* Info Grid - 3 Columns */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            width: 100%;
            max-width: 600px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 2rem;
            opacity: 0.8;
        }

        .info-item {
            text-align: center;
            border-right: 1px solid rgba(255,255,255,0.2);
        }
        
        .info-item:last-child {
            border-right: none;
        }

        .label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .value {
            font-size: 1rem;
            font-weight: 700;
        }

        /* --- SYSTEM LOG (REAL GMOD STATUS) --- */
        .system-log-container {
            position: fixed;
            top: 72%; /* Just below the info grid */
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 1200px;
            height: 25vh; /* Fits the bottom area */
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 25;
            pointer-events: none;
            /* Fade out at the bottom */
            mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
        }

        .log-entry {
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            margin-bottom: 0.1rem;
            transition: all 0.3s ease;
            text-align: center;
            width: 100%;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* The Newest Entry (First Child) */
        .log-entry:first-child {
            font-size: 2rem; /* ОЧЕНЬ КРУПНО */
            color: #fff;
            font-weight: 800;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
            margin-bottom: 1rem; 
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* History Entries */
        .log-entry:nth-child(2) { font-size: 1.2rem; color: #ccc; opacity: 0.9; }
        .log-entry:nth-child(3) { font-size: 1rem; color: #aaa; opacity: 0.8; }
        .log-entry:nth-child(n+4) { font-size: 0.9rem; color: #888; opacity: 0.6; }
        .log-entry:nth-child(n+8) { font-size: 0.8rem; color: #666; opacity: 0.4; }
        .log-entry:nth-child(n+12) { opacity: 0; }


        .footer {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            z-index: 20;
            font-size: 0.6rem;
            color: #333;
            font-family: 'JetBrains Mono', monospace;
        }

    </style>
</head>
<body>

    <div class="bg-image"></div>
    <div class="vignette"></div>
    <div class="scanlines"></div>
    <div class="noise"></div>

    <div class="content-wrapper">
        
        <h1 class="main-title">AGAF-CITY</h1>
        <div class="subtitle">ПРИСОЕДИНЯЕМСЯ</div>

        <div class="scanner-container">
            <div class="scanner-bar"></div>
        </div>

        <div class="status-box">
            <div id="main-status" class="main-status">ЗАГРУЗКА...</div>
            <div id="sub-status" class="sub-status"></div>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <div class="label">Режим</div>
                <div class="value">SANDBOX / FUN</div>
            </div>
            <div class="info-item">
                <div class="label">Статус</div>
                <div class="value">ЛУЧШИЙ</div>
            </div>
            <div class="info-item">
                <div class="label">Вайб</div>
                <div class="value" style="text-shadow: 0 0 10px rgba(255,255,255,0.3);">БОМБЕЗНЫЙ</div>
            </div>
        </div>

    </div>

    <!-- The Rolling Log for GMod Status -->
    <div id="system-log" class="system-log-container"></div>

    <div class="footer">
        v.2.0.7 // SYSTEM_READY
    </div>

    <script>
        const tracks = [
            'https://image2url.com/r2/default/audio/1773049946602-7e7f15ae-bb2b-4ce6-b274-f24efcb36612.mp3',
            'https://image2url.com/r2/default/audio/1773049972927-6764394a-f1cd-402d-bb5d-5fffff6d5995.mp3',
            'https://image2url.com/r2/default/audio/1773051528448-dc81281f-7bbc-496d-abd6-1ba6c00bd92f.mp3'
        ];

        const mainPhrases = [
            "AGAF БОССЯРА",
            "ЛОМАЮ ВАШУ ЖОПУ",
            "СИНХРОНИЗАЦИЯ С СЕРВАЧКОМ",
            "БЕШАНАЯ СОБАКА",
            "ИНИЦИАЛИЗАЦИЯ ВЕСЕЛЬЯ",
            "ПРОВЕРКА ВАШЕГО ОЧКА",
            "РАСПАКОВКА БОМБЫ",
            "ЗАГРУЗКА ПУШЕЧКИ",
            "ЗАГРУЖАЕМ ЛУЧШИЙ СЕРВЕР",
            "ЧТО ПИСАТЬ LOL",
            "МЕЛСТРОЙ БЭМ БЭМ ПЭМ",
            "ОКАК",
            "SIX SEVEN MELSTROY",
            "ПРИВЕТ АРТУРИЩЕ"
        ];

        const subPhrases = [
            "Ищем оружие...",
            "Настраиваем физику пропов...",
            "Договариваемся с Mingebags...",
            "Загружаем LUA скрипты (без ошибок, надеемся)...",
            "Готовимся к безумию...",
            "Оптимизируем пушку неземную...",
            "Проверка на наличие неземных приколов...",
            "Удаление скуки из системы...",
            "Загрузка плюшек для VIPERR...",
            "Загрузка рагдоллов...",
            "Уговариваем сервер не лагать...",
            "Скачиваем интернет...",
            "Привет...",
            "Ищем пропы...",
            "Компиляция бомбы неземной...",
            "Взлом вашего компутера...",
            "Загрузка моделий игроков...",
            "Ждем ответа от Agaf Engine..."
        ];

        const mainStatusEl = document.getElementById('main-status');
        const subStatusEl = document.getElementById('sub-status');
        const logContainer = document.getElementById('system-log');
        let typeTimeout;

        function playRandomTrack() {
            const randomTrack = tracks[Math.floor(Math.random() * tracks.length)];
            const audio = new Audio(randomTrack);
            audio.volume = 0.2; 
            audio.loop = true;
            audio.play().catch(e => console.log("Audio autoplay blocked"));
        }

        function typeWriter(element, text, speed = 30) {
            if (typeTimeout) clearTimeout(typeTimeout);
            element.innerHTML = "";
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    typeTimeout = setTimeout(type, speed);
                }
            }
            type();
        }

        let lastMainIndex = -1;

        function cycleText() {
            mainStatusEl.style.transition = 'opacity 0.5s ease-out';
            mainStatusEl.style.opacity = 0;
            
            setTimeout(() => {
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * mainPhrases.length);
                } while (newIndex === lastMainIndex && mainPhrases.length > 1);
                lastMainIndex = newIndex;
                
                mainStatusEl.innerText = mainPhrases[newIndex];
                mainStatusEl.style.opacity = 1;
            }, 500);

            setTimeout(() => {
                 const nextSub = subPhrases[Math.floor(Math.random() * subPhrases.length)];
                 typeWriter(subStatusEl, nextSub, 30);
            }, 600);
        }

        // --- SYSTEM LOG LOGIC ---
        function updateLog(text) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = "> " + text;
            
            // Insert at top
            if(logContainer.firstChild) {
                logContainer.insertBefore(entry, logContainer.firstChild);
            } else {
                logContainer.appendChild(entry);
            }

            // Keep up to 15 items now
            while (logContainer.children.length > 15) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }

        window.addEventListener('load', () => {
            playRandomTrack();
            lastMainIndex = Math.floor(Math.random() * mainPhrases.length);
            mainStatusEl.innerText = mainPhrases[lastMainIndex];
            typeWriter(subStatusEl, subPhrases[Math.floor(Math.random() * subPhrases.length)], 30);
            
            // Initialize log with a message so it's not empty
            updateLog("SYSTEM_INITIALIZED");
            
            setInterval(cycleText, 5000); 
        });

        // --- GMOD SPECIFIC HOOKS ---
        
        function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode) {
            updateLog("CONNECTING TO: " + servername);
        }
        
        function DownloadingFile(fileName) {
            updateLog("DOWNLOADING: " + fileName);
        }

        function SetStatusChanged(status) {
             updateLog(status);
        }
    </script>
</body>
</html>
