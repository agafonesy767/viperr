<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agaf-City Loading</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;800&family=Oswald:wght@700&display=swap');

        :root {
            --bg-color: #000;
            --main-color: #fff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--main-color);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
        }

        /* Noise Overlay */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 8;
            opacity: 0.07;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        /* Scanlines Overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.3) 50%,
                rgba(0,0,0,0.3)
            );
            background-size: 100% 3px;
            pointer-events: none;
            z-index: 10;
        }

        /* Vignette */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, black 100%);
            z-index: 5;
            pointer-events: none;
        }

        /* Background Image Animation */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Decoded URL to ensure it loads correctly */
            background-image: url('https://i.ytimg.com/vi/At21TrFKpg0/maxresdefault.jpg?sqp=-oaymwEmCIAKENAF8quKqQMa8AEB-AH-CYAC0AWKAgwIABABGGMgYyhjMA8=&rs=AOn4CLAxvsmPNR5QMWrzlebKszhCR5Uc2Q');
            background-size: cover;
            background-position: center;
            filter: grayscale(100%) contrast(1.3) brightness(0.3);
            animation: zoomDrift 40s infinite alternate ease-in-out;
            z-index: 0;
        }

        @keyframes zoomDrift {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        /* The "Back and Forth" Loader */
        .scanner-container {
            width: 100%;
            max-width: 600px;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            margin: 2rem 0;
        }

        .scanner-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 30%;
            height: 100%;
            background: #fff;
            animation: shuttle 2s infinite ease-in-out;
        }

        @keyframes shuttle {
            0% { left: -30%; }
            50% { left: 100%; }
            100% { left: -30%; }
        }

        /* Main Title Style */
        .main-title {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            /* No glow/shadow as requested */
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in forwards;
            opacity: 0;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Scrollbar for hidden overflow but logic */
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body class="flex flex-col items-center justify-center relative">

    <!-- Background Layers -->
    <div class="bg-image"></div>
    <div class="vignette"></div>
    <div class="scanlines"></div>
    <div class="noise"></div>

    <!-- Main Content -->
    <main class="z-20 flex flex-col items-center justify-center w-full max-w-4xl px-4 text-center">
        
        <!-- Server Title -->
        <h1 class="text-7xl md:text-9xl font-bold mb-2 main-title tracking-widest">
            AGAF-CITY
        </h1>
        
        <!-- Subtitle -->
        <div class="text-xl md:text-2xl text-gray-300 font-light tracking-widest uppercase mb-12 opacity-80">
            ПРИСОЕДИНЯЕМСЯ
        </div>

        <!-- The Loader -->
        <div class="scanner-container">
            <div class="scanner-bar"></div>
        </div>

        <!-- Dynamic Status Area -->
        <div class="h-24 flex flex-col items-center justify-center">
            <h2 id="main-status" class="text-2xl font-bold uppercase mb-2">ЗАГРУЗКА ПРИКОЛОВ...</h2>
            <p id="sub-status" class="text-sm text-gray-400 font-mono h-6"></p>
        </div>

        <!-- Info Grid -->
        <div class="grid grid-cols-3 gap-8 mt-12 w-full max-w-2xl border-t border-gray-800 pt-8 opacity-60">
            <div class="text-center">
                <div class="text-xs text-gray-500 uppercase mb-1">Режим</div>
                <div class="text-sm font-bold">ZCITY / FUN</div>
            </div>
            <div class="text-center border-l border-r border-gray-800">
                <div class="text-xs text-gray-500 uppercase mb-1">Статус</div>
                <div class="text-sm font-bold">ЛУЧШИЙ</div>
            </div>
            <div class="text-center">
                <div class="text-xs text-gray-500 uppercase mb-1">Визуал</div>
                <div class="text-sm font-bold">БОМБЕЗНЫЙ</div>
            </div>
        </div>

    </main>

    <!-- Footer / Version -->
    <div class="fixed bottom-4 right-4 z-20 text-xs text-gray-600 font-mono">
        v.2.0.4 // SYSTEM_READY
    </div>



    <script>
        // Music Configuration
	const tracks = [
            'https://image2url.com/r2/default/audio/1773049946602-7e7f15ae-bb2b-4ce6-b274-f24efcb36612.mp3',
            'https://image2url.com/r2/default/audio/1773049972927-6764394a-f1cd-402d-bb5d-5fffff6d5995.mp3',
            'https://image2url.com/r2/default/audio/1773051528448-dc81281f-7bbc-496d-abd6-1ba6c00bd92f.mp3'
        ];

        // Funny / GMod Specific Phrases
	const mainPhrases = [
            "AGAF БОССЯРА",
            "ЛОМАЮ ВАШУ ЖОПУ",
            "СИНХРОНИЗАЦИЯ С СЕРВАЧКОМ",
            "БЕШАНАЯ СОБАКА",
            "ИНИЦИАЛИЗАЦИЯ ВЕСЕЛЬЯ",
            "ПРОВЕРКА ВАШЕГО ОЧКА",
            "РАСПАКОВКА БОМБЫ",
            "ЗАГРУЗКА ПУШЕЧКИ",
            "ЗАГРУЖАЕМ ЛУЧШИЙ СЕРВЕР"
        	"ЧТО ПИСАТЬ LOL"
        	"МЕЛСТРОЙ БЭМ БЭМ ПЭМ"
            	"ОКАК"
       		 "SIX SEVEN MELSTROY"
       		 "ПРИВЕТ АРТУРИЩЕ"
        ];

	const subPhrases = [
            "Ищем оружие...",
            "Настраиваем физику пропов...",
            "Договариваемся с Mingebags...",
            "Загружаем LUA скрипты (без ошибок, надеемся)...",
            "Готовимся к безумию...",
            "Оптимизируем пушку неземную...",
            "Проверка на наличие неземных приколов...",
            "Удаление скуки из системы...",
            "Загрузка плюшек для VIPERR...",
            "Загрузка рагдоллов...",
            "Уговариваем сервер не лагать...",
            "Скачиваем интернет...",
            "Привет...",
            "Ищем пропы...",
            "Компиляция бомбы неземной...",
            "Взлом вашего компутера...",
            "Загрузка моделий игроков...",
            "Ждем ответа от Agaf Engine..."
        ];

        // Elements
        const mainStatusEl = document.getElementById('main-status');
        const subStatusEl = document.getElementById('sub-status');

        // Audio Logic
        const audio = new Audio();
        audio.volume = 0.2; 
        audio.loop = true;

        function playRandomTrack() {
            const randomTrack = tracks[Math.floor(Math.random() * tracks.length)];
            audio.src = randomTrack;
            
            // Try to play immediately. In GMod/Source this usually works. 
            // In standard browsers it might be blocked, but we removed the overlay as requested.
            audio.play().then(() => {
                console.log("Audio playing");
            }).catch(error => {
                console.log("Autoplay blocked by browser policy (requires interaction)");
            });
        }

        // Typewriter Logic
        let typeTimeout; 

        function typeWriter(element, text, speed = 25) {
            // Clear any pending typing
            if (typeTimeout) clearTimeout(typeTimeout);
            
            element.innerHTML = "";
            let i = 0;
            
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    typeTimeout = setTimeout(type, speed);
                }
            }
            type();
        }

        let mainIndex = Math.floor(Math.random() * mainPhrases.length);

        function cycleText() {
            // Main Status Animation
            mainStatusEl.style.transition = 'opacity 0.5s ease-out';
            mainStatusEl.style.opacity = 0;
            
            setTimeout(() => {
                // Random main phrase (different from current)
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * mainPhrases.length);
                } while (newIndex === mainIndex && mainPhrases.length > 1);
                mainIndex = newIndex;
                
                mainStatusEl.innerText = mainPhrases[mainIndex];
                mainStatusEl.style.opacity = 1;
            }, 500);

            // Sub Status Animation (Typewriter)
            setTimeout(() => {
                 const nextSub = subPhrases[Math.floor(Math.random() * subPhrases.length)];
                 typeWriter(subStatusEl, nextSub, 30);
            }, 600);
        }

        // Initialize
        window.addEventListener('load', () => {
            // Start audio
            playRandomTrack();
            
            // Initial text set (using random index)
            mainStatusEl.innerText = mainPhrases[mainIndex];
            typeWriter(subStatusEl, subPhrases[Math.floor(Math.random() * subPhrases.length)], 30);

            // Start cycle loop
            setInterval(cycleText, 5000); 
        });

        // GMod specific: Hook into actual download progress if available
        function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode) {
            // This function is called by GMod when loading starts.
            console.log("Connecting to " + servername);
        }
        
        function DownloadingFile(fileName) {
            // Called when downloading a specific file
            if (typeTimeout) clearTimeout(typeTimeout);
            subStatusEl.innerText = "Загрузка: " + fileName;
        }

        function SetStatusChanged(status) {
             if (typeTimeout) clearTimeout(typeTimeout);
             subStatusEl.innerText = status;
        }
    </script>
</body>
</html>
