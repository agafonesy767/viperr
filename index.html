<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agaf-City Loading</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Oswald:wght@700&display=swap');

        /* RESET & BASE */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            overflow: hidden;
            user-select: none;
        }

        /* LAYERS */
        #bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ytimg.com/vi/At21TrFKpg0/maxresdefault.jpg?sqp=-oaymwEmCIAKENAF8quKqQMa8AEB-AH-CYAC0AWKAgwIABABGGMgYyhjMA8=&rs=AOn4CLAxvsmPNR5QMWrzlebKszhCR5Uc2Q');
            background-size: cover;
            background-position: center;
            /* Black & White filter as requested */
            filter: grayscale(100%) contrast(1.2) brightness(0.4);
            transform: scale(1);
            animation: kenburns 30s infinite alternate ease-in-out;
            z-index: 1;
        }

        @keyframes kenburns {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        /* EFFECTS OVERLAYS */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 2;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 50%, black 100%);
            z-index: 3;
            pointer-events: none;
        }

        /* MAIN CONTENT CONTAINER - Centered Perfectly */
        #content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            width: 80%;
            max-width: 1000px;
        }

        /* TYPOGRAPHY */
        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 6rem; /* Big text */
            line-height: 1;
            margin-bottom: 0.2em;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .subtitle {
            font-size: 1.5rem;
            letter-spacing: 5px;
            opacity: 0.8;
            margin-bottom: 3rem;
            text-transform: uppercase;
        }

        /* LOADING BAR - The Shuttle */
        .loader-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            position: relative;
            margin: 2rem 0;
            overflow: hidden;
        }

        .loader-shuttle {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 25%; /* Length of the moving line */
            background: #fff;
            animation: shuttleMove 1.5s infinite ease-in-out;
        }

        @keyframes shuttleMove {
            0% { left: -25%; }
            50% { left: 100%; }
            100% { left: -25%; }
        }

        /* STATUS TEXT */
        #status-box {
            height: 80px; /* Fixed height to prevent jumping */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #main-status {
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        #sub-status {
            font-size: 1.2rem;
            color: #ccc;
            min-height: 1.5em;
        }

        /* FOOTER INFO */
        .info-bar {
            margin-top: 3rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            opacity: 0.6;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .info-item span {
            display: block;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* RESPONSIVENESS for smaller screens */
        @media (max-width: 800px) {
            h1 { font-size: 4rem; letter-spacing: 5px; }
            .subtitle { font-size: 1rem; }
            #main-status { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div id="content">
        <h1>AGAF-CITY</h1>
        <div class="subtitle">ПРИСОЕДИНЯЕМСЯ</div>

        <div class="loader-track">
            <div class="loader-shuttle"></div>
        </div>

        <div id="status-box">
            <div id="main-status">ЗАГРУЗКА...</div>
            <div id="sub-status"></div>
        </div>

        <div class="info-bar">
            <div class="info-item">Режим<br><span>DARK RP / FUN</span></div>
            <div class="info-item">Админ<br><span>AGAF</span></div>
            <div class="info-item">Вайб<br><span>НЕРЕАЛЬНЫЙ</span></div>
        </div>
    </div>

    <script>
        // --- DATA ---
        const musicTracks = [
            'https://image2url.com/r2/default/audio/1773049946602-7e7f15ae-bb2b-4ce6-b274-f24efcb36612.mp3',
            'https://image2url.com/r2/default/audio/1773049972927-6764394a-f1cd-402d-bb5d-5fffff6d5995.mp3'
        ];

        const bigPhrases = [
            "AGAF БОССЯРА",
            "ЛОМАЮ ВАШУ ЖОПУ",
            "СИНХРОНИЗАЦИЯ С СЕРВАЧКОМ",
            "БЕШАНАЯ СОБАКА",
            "ИНИЦИАЛИЗАЦИЯ ВЕСЕЛЬЯ",
            "ПРОВЕРКА ВАШЕГО ОЧКА",
            "РАСПАКОВКА БОМБЫ",
            "ЗАГРУЗКА ПУШЕЧКИ",
            "ЗАГРУЖАЕМ ЛУЧШИЙ СЕРВЕР",
            "ЧТО ПИСАТЬ LOL",
            "МЕЛСТРОЙ БЭМ БЭМ ПЭМ",
            "ОКАК",
            "SIX SEVEN MELSTROY",
            "ПРИВЕТ АРТУРИЩЕ"
        ];

        const smallPhrases = [
            "Ищем оружие...",
            "Настраиваем физику пропов...",
            "Договариваемся с Mingebags...",
            "Загружаем LUA скрипты (без ошибок, надеемся)...",
            "Готовимся к безумию...",
            "Оптимизируем пушку неземную...",
            "Проверка на наличие неземных приколов...",
            "Удаление скуки из системы...",
            "Загрузка плюшек для VIPERR...",
            "Загрузка рагдоллов...",
            "Уговариваем сервер не лагать...",
            "Скачиваем интернет...",
            "Привет...",
            "Ищем пропы...",
            "Компиляция бомбы неземной...",
            "Взлом вашего компутера...",
            "Загрузка моделий игроков...",
            "Ждем ответа от Agaf Engine..."
        ];

        // --- ELEMENTS ---
        const mainStatusEl = document.getElementById('main-status');
        const subStatusEl = document.getElementById('sub-status');
        let typeInterval;

        // --- FUNCTIONS ---

        // 1. Music Player
        function playMusic() {
            const track = musicTracks[Math.floor(Math.random() * musicTracks.length)];
            const audio = new Audio(track);
            audio.volume = 0.3; // Not too loud
            audio.loop = true;
            audio.play().catch(e => console.log("Autoplay blocked (normal in browsers, fine in GMod):", e));
        }

        // 2. Typewriter Effect for Subtitles
        function typeText(text) {
            clearInterval(typeInterval);
            subStatusEl.innerText = "";
            let i = 0;
            typeInterval = setInterval(() => {
                if (i < text.length) {
                    subStatusEl.innerText += text.charAt(i);
                    i++;
                } else {
                    clearInterval(typeInterval);
                }
            }, 30); // Typing speed
        }

        // 3. Logic to Cycle Phrases
        function updatePhrases() {
            // Random Big Phrase
            const randomBig = bigPhrases[Math.floor(Math.random() * bigPhrases.length)];
            mainStatusEl.innerText = randomBig;

            // Random Small Phrase (with typewriter)
            const randomSmall = smallPhrases[Math.floor(Math.random() * smallPhrases.length)];
            typeText(randomSmall);
        }

        // --- INITIALIZATION ---
        window.onload = function() {
            playMusic();
            updatePhrases();
            // Change text every 5 seconds
            setInterval(updatePhrases, 5000);
        };

        // --- GMOD HOOKS (CRITICAL FOR LOADING SCREEN) ---
        // These are called by the game engine itself.
        
        // When downloading a specific file
        function DownloadingFile(fileName) {
            // We override the random text with actual file info when it happens
            clearInterval(typeInterval);
            subStatusEl.innerText = "Скачивание: " + fileName;
        }

        // When status changes (Connecting, Sending Client Info, etc)
        function SetStatusChanged(status) {
            clearInterval(typeInterval);
            subStatusEl.innerText = status;
        }
    </script>
</body>
</html>
