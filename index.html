<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agaf-City Loading</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;800&family=Oswald:wght@700&display=swap');

        /* Reset & Base Styles */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Background Image with Zoom Effect */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ytimg.com/vi/At21TrFKpg0/maxresdefault.jpg?sqp=-oaymwEmCIAKENAF8quKqQMa8AEB-AH-CYAC0AWKAgwIABABGGMgYyhjMA8=&rs=AOn4CLAxvsmPNR5QMWrzlebKszhCR5Uc2Q');
            background-size: cover;
            background-position: center;
            filter: grayscale(100%) contrast(1.3) brightness(0.3);
            animation: zoomDrift 40s infinite alternate ease-in-out;
            z-index: 0;
        }

        @keyframes zoomDrift {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        /* Overlays (Noise, Vignette, Scanlines) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .noise {
            z-index: 1;
            opacity: 0.07;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        .scanlines {
            z-index: 2;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.3) 50%,
                rgba(0,0,0,0.3)
            );
            background-size: 100% 3px;
        }

        .vignette {
            z-index: 3;
            background: radial-gradient(circle, transparent 40%, black 100%);
        }

        /* Main Content Container */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 900px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Main Title */
        h1.main-title {
            font-family: 'Oswald', sans-serif;
            font-size: 6rem; /* Large size */
            font-weight: 700;
            margin: 0 0 10px 0;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            line-height: 1;
        }

        /* Subtitle "JOINING" */
        .subtitle {
            font-size: 1.5rem;
            color: #ccc;
            font-weight: 300;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            margin-bottom: 3rem;
            opacity: 0.8;
        }

        /* Loader Bar */
        .scanner-container {
            width: 100%;
            max-width: 600px;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            margin: 2rem 0;
        }

        .scanner-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 30%;
            height: 100%;
            background: #fff;
            animation: shuttle 1.5s infinite ease-in-out;
        }

        @keyframes shuttle {
            0% { left: -30%; }
            50% { left: 100%; }
            100% { left: -30%; }
        }

        /* Status Text Area */
        .status-area {
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #main-status {
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            transition: opacity 0.5s ease-out;
        }

        #sub-status {
            font-size: 1rem;
            color: #aaa;
            height: 1.2em; /* fixed height to prevent jumping */
        }

        /* Grid Info at bottom */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 3rem;
            width: 100%;
            max-width: 600px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 20px;
            opacity: 0.6;
        }

        .grid-item {
            text-align: center;
        }

        .grid-item.middle {
            border-left: 1px solid rgba(255,255,255,0.2);
            border-right: 1px solid rgba(255,255,255,0.2);
        }

        .grid-label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .grid-value {
            font-size: 1rem;
            font-weight: bold;
        }

        /* Version Tag */
        .version {
            position: fixed;
            bottom: 15px;
            right: 15px;
            z-index: 20;
            font-size: 0.8rem;
            color: #666;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            h1.main-title { font-size: 3rem; }
            .subtitle { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Layers -->
    <div class="bg-image"></div>
    <div class="overlay vignette"></div>
    <div class="overlay scanlines"></div>
    <div class="overlay noise"></div>

    <!-- Main Content -->
    <div class="content">
        <h1 class="main-title">AGAF-CITY</h1>
        <div class="subtitle">ПРИСОЕДИНЯЕМСЯ</div>

        <div class="scanner-container">
            <div class="scanner-bar"></div>
        </div>

        <div class="status-area">
            <div id="main-status">ЗАГРУЗКА ПРИКОЛОВ...</div>
            <div id="sub-status"></div>
        </div>

        <div class="info-grid">
            <div class="grid-item">
                <div class="grid-label">Режим</div>
                <div class="grid-value">ZCITY / FUN</div>
            </div>
            <div class="grid-item middle">
                <div class="grid-label">Статус</div>
                <div class="grid-value">ЛУЧШИЙ</div>
            </div>
            <div class="grid-item">
                <div class="grid-label">Визуал</div>
                <div class="grid-value">БОМБЕЗНЫЙ</div>
            </div>
        </div>
    </div>

    <div class="version">v.2.0.4 // SYSTEM_READY</div>

    <script>
        // --- CONFIGURATION ---
        const tracks = [
            'https://image2url.com/r2/default/audio/1773049946602-7e7f15ae-bb2b-4ce6-b274-f24efcb36612.mp3',
            'https://image2url.com/r2/default/audio/1773049972927-6764394a-f1cd-402d-bb5d-5fffff6d5995.mp3',
            'https://image2url.com/r2/default/audio/1773051528448-dc81281f-7bbc-496d-abd6-1ba6c00bd92f.mp3'
        ];

        // Fixed syntax errors here (added commas)
        const mainPhrases = [
            "AGAF БОССЯРА",
            "ЛОМАЮ ВАШУ ЖОПУ",
            "СИНХРОНИЗАЦИЯ С СЕРВАЧКОМ",
            "БЕШАНАЯ СОБАКА",
            "ИНИЦИАЛИЗАЦИЯ ВЕСЕЛЬЯ",
            "ПРОВЕРКА ВАШЕГО ОЧКА",
            "РАСПАКОВКА БОМБЫ",
            "ЗАГРУЗКА ПУШЕЧКИ",
            "ЗАГРУЖАЕМ ЛУЧШИЙ СЕРВЕР",
            "ЧТО ПИСАТЬ LOL",
            "МЕЛСТРОЙ БЭМ БЭМ ПЭМ",
            "ОКАК",
            "SIX SEVEN MELSTROY",
            "ПРИВЕТ АРТУРИЩЕ"
        ];

        const subPhrases = [
            "Ищем оружие...",
            "Настраиваем физику пропов...",
            "Договариваемся с Mingebags...",
            "Загружаем LUA скрипты (без ошибок, надеемся)...",
            "Готовимся к безумию...",
            "Оптимизируем пушку неземную...",
            "Проверка на наличие неземных приколов...",
            "Удаление скуки из системы...",
            "Загрузка плюшек для VIPERR...",
            "Загрузка рагдоллов...",
            "Уговариваем сервер не лагать...",
            "Скачиваем интернет...",
            "Привет...",
            "Ищем пропы...",
            "Компиляция бомбы неземной...",
            "Взлом вашего компутера...",
            "Загрузка моделий игроков...",
            "Ждем ответа от Agaf Engine..."
        ];

        // --- LOGIC ---
        
        const mainStatusEl = document.getElementById('main-status');
        const subStatusEl = document.getElementById('sub-status');
        let currentMainIndex = -1;
        let typeTimeout;

        // Music Logic
        function playRandomMusic() {
            const track = tracks[Math.floor(Math.random() * tracks.length)];
            const audio = new Audio(track);
            audio.volume = 0.3;
            audio.loop = true;
            audio.play().catch(e => console.log("Autoplay blocked:", e));
        }

        // Typewriter Effect
        function typeWriter(text, i = 0) {
            if (i === 0) subStatusEl.textContent = "";
            if (i < text.length) {
                subStatusEl.textContent += text.charAt(i);
                typeTimeout = setTimeout(() => typeWriter(text, i + 1), 30);
            }
        }

        // Random Phrase Logic
        function updatePhrases() {
            // Main phrase fade out
            mainStatusEl.style.opacity = '0';

            setTimeout(() => {
                // Pick unique random index
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * mainPhrases.length);
                } while (newIndex === currentMainIndex);
                currentMainIndex = newIndex;

                // Update text and fade in
                mainStatusEl.textContent = mainPhrases[currentMainIndex];
                mainStatusEl.style.opacity = '1';

                // Update sub phrase with typewriter
                if (typeTimeout) clearTimeout(typeTimeout);
                const randomSub = subPhrases[Math.floor(Math.random() * subPhrases.length)];
                typeWriter(randomSub);

            }, 500);
        }

        // Initialize
        window.addEventListener('load', () => {
            playRandomMusic();
            updatePhrases(); // Initial set
            setInterval(updatePhrases, 4000); // Change every 4 seconds
        });

        // --- GMOD HOOKS ---
        
        // This function receives file updates from GMod
        function DownloadingFile(fileName) {
            if (typeTimeout) clearTimeout(typeTimeout);
            // Show actual file being downloaded
            subStatusEl.textContent = "Загрузка: " + fileName;
        }

        function StatusChanged(status) {
            if (typeTimeout) clearTimeout(typeTimeout);
            subStatusEl.textContent = status;
        }
        
        // Needed for GMod to recognize this as a loading screen sometimes
        function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode) {}
    </script>
</body>
</html>
