<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agaf-City Loading</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;800&family=Oswald:wght@700&display=swap');

        :root {
            --bg-color: #000;
            --main-color: #fff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--main-color);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Background Image Animation */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ytimg.com/vi/At21TrFKpg0/maxresdefault.jpg?sqp=-oaymwEmCIAKENAF8quKqQMa8AEB-AH-CYAC0AWKAgwIABABGGMgYyhjMA8=&rs=AOn4CLAxvsmPNR5QMWrzlebKszhCR5Uc2Q');
            background-size: cover;
            background-position: center;
            filter: grayscale(100%) contrast(1.2) brightness(0.4);
            animation: zoomDrift 40s infinite alternate ease-in-out;
            z-index: 0;
        }

        @keyframes zoomDrift {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        /* Main Content Wrapper */
        .content {
            z-index: 10;
            position: relative;
            text-align: center;
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }

        /* Main Title Style */
        .main-title {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            font-size: 5rem;
            margin: 0;
            line-height: 1.1;
        }

        /* Subtitle */
        .subtitle {
            font-size: 1.5rem;
            color: #ccc;
            font-weight: 300;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            margin-bottom: 3rem;
            opacity: 0.8;
        }

        /* The "Back and Forth" Loader */
        .scanner-container {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            margin: 2rem auto;
            max-width: 600px;
        }

        .scanner-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 30%;
            height: 100%;
            background: #fff;
            animation: shuttle 2s infinite ease-in-out;
        }

        @keyframes shuttle {
            0% { left: -30%; }
            50% { left: 100%; }
            100% { left: -30%; }
        }

        /* Dynamic Status Area */
        .status-area {
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #main-status {
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            transition: opacity 0.5s ease;
        }

        #sub-status {
            font-size: 1rem;
            color: #aaa;
            font-family: 'JetBrains Mono', monospace;
            height: 1.5rem;
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            padding-top: 2rem;
            opacity: 0.8;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-size: 1rem;
            font-weight: bold;
        }

        .info-item.middle {
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Version Footer */
        .version {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 0.75rem;
            color: #666;
            z-index: 20;
        }

    </style>
</head>
<body>

    <!-- Background -->
    <div class="bg-image"></div>

    <!-- Main Content -->
    <div class="content">
        
        <h1 class="main-title">AGAF-CITY</h1>
        <div class="subtitle">ПРИСОЕДИНЯЕМСЯ</div>

        <div class="scanner-container">
            <div class="scanner-bar"></div>
        </div>

        <div class="status-area">
            <div id="main-status">ЗАГРУЗКА ПРИКОЛОВ...</div>
            <div id="sub-status"></div>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">Режим</div>
                <div class="info-value">SANDBOX / FUN</div>
            </div>
            <div class="info-item middle">
                <div class="info-label">Статус</div>
                <div class="info-value">ЛУЧШИЙ</div>
            </div>
            <div class="info-item">
                <div class="info-label">Визуал</div>
                <div class="info-value">БОМБЕЗНЫЙ</div>
            </div>
        </div>

    </div>

    <div class="version">v.2.0.5 // SYSTEM_READY</div>

    <script>
        // --- CONFIGURATION ---
        const tracks = [
            'https://image2url.com/r2/default/audio/1773049946602-7e7f15ae-bb2b-4ce6-b274-f24efcb36612.mp3',
            'https://image2url.com/r2/default/audio/1773049972927-6764394a-f1cd-402d-bb5d-5fffff6d5995.mp3',
            'https://image2url.com/r2/default/audio/1773051528448-dc81281f-7bbc-496d-abd6-1ba6c00bd92f.mp3'
        ];

        // FIXED: Removed "AGAF БОССЯРА" and added commas
        const mainPhrases = [
            "AGAF БОССЯРА"
            "ЛОМАЮ ВАШУ ЖОПУ",
            "СИНХРОНИЗАЦИЯ С СЕРВАЧКОМ",
            "БЕШАНАЯ СОБАКА",
            "ИНИЦИАЛИЗАЦИЯ ВЕСЕЛЬЯ",
            "ПРОВЕРКА ВАШЕГО ОЧКА",
            "РАСПАКОВКА БОМБЫ",
            "ЗАГРУЗКА ПУШЕЧКИ",
            "ЗАГРУЖАЕМ ЛУЧШИЙ СЕРВЕР",
            "ЧТО ПИСАТЬ LOL",
            "МЕЛСТРОЙ БЭМ БЭМ ПЭМ",
            "ОКАК",
            "SIX SEVEN MELSTROY",
            "ПРИВЕТ АРТУРИЩЕ"
        ];

        const subPhrases = [
            "Ищем оружие...",
            "Настраиваем физику пропов...",
            "Договариваемся с Mingebags...",
            "Загружаем LUA скрипты (без ошибок, надеемся)...",
            "Готовимся к безумию...",
            "Оптимизируем пушку неземную...",
            "Проверка на наличие неземных приколов...",
            "Удаление скуки из системы...",
            "Загрузка плюшек для VIPERR...",
            "Загрузка рагдоллов...",
            "Уговариваем сервер не лагать...",
            "Скачиваем интернет...",
            "Привет...",
            "Ищем пропы...",
            "Компиляция бомбы неземной...",
            "Взлом вашего компутера...",
            "Загрузка моделий игроков...",
            "Ждем ответа от Agaf Engine..."
        ];

        // --- ELEMENTS ---
        const mainStatusEl = document.getElementById('main-status');
        const subStatusEl = document.getElementById('sub-status');
        let typeTimeout; 
        let currentMainIndex = -1;

        // --- AUDIO ---
        const audio = new Audio();
        audio.volume = 0.2; 
        audio.loop = true;

        function playRandomTrack() {
            const randomTrack = tracks[Math.floor(Math.random() * tracks.length)];
            audio.src = randomTrack;
            audio.play().catch(e => console.log("Audio autoplay might be blocked: ", e));
        }

        // --- TYPEWRITER EFFECT ---
        function typeWriter(text, speed = 30) {
            if (typeTimeout) clearTimeout(typeTimeout);
            
            subStatusEl.textContent = ""; // Clear completely
            let i = 0;
            
            function type() {
                if (i < text.length) {
                    subStatusEl.textContent += text.charAt(i);
                    i++;
                    typeTimeout = setTimeout(type, speed);
                }
            }
            type();
        }

        // --- CYCLING LOGIC ---
        function updateMainText() {
            // Fade out
            mainStatusEl.style.opacity = 0;

            setTimeout(() => {
                // Select new random phrase
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * mainPhrases.length);
                } while (newIndex === currentMainIndex && mainPhrases.length > 1);
                
                currentMainIndex = newIndex;
                mainStatusEl.textContent = mainPhrases[currentMainIndex];
                
                // Fade in
                mainStatusEl.style.opacity = 1;
            }, 500);
        }

        function updateSubText() {
            // Pick random sub phrase and type it
            const randomSub = subPhrases[Math.floor(Math.random() * subPhrases.length)];
            typeWriter(randomSub);
        }

        function cycleAll() {
            updateMainText();
            // Delay sub-text slightly for better rhythm
            setTimeout(updateSubText, 600);
        }

        // --- INITIALIZATION ---
        window.addEventListener('load', () => {
            playRandomTrack();
            
            // Initial Set
            updateMainText();
            updateSubText();

            // Loop every 5 seconds
            setInterval(cycleAll, 5000);
        });

        // --- GMOD HOOKS ---
        // These are called by the game engine
        function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode) {
            console.log("Loading " + servername);
        }

        function DownloadingFile(fileName) {
            // If the game is downloading a file, we show it instantly
            if (typeTimeout) clearTimeout(typeTimeout);
            subStatusEl.textContent = "Загрузка: " + fileName;
        }

        function SetStatusChanged(status) {
             if (typeTimeout) clearTimeout(typeTimeout);
             subStatusEl.textContent = status;
        }
    </script>
</body>
</html>
